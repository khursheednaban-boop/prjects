<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapchat - Home</title>
<style>
  body{
    font-family:'Avenir Next','Helvetica Neue',Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; margin:0; background:#fff; color:#0a0a0a; text-align:center; padding:20px;
  }
  h1{ font-size:24px; margin-bottom:8px; }
  p{ color:#6c6c6c; margin-bottom:24px; }
  button{
    padding:12px 28px; background:#0a0a0a; color:#fff; border:none;
    border-radius:24px; font-weight:700; cursor:pointer; font-size:14px;
  }
</style>
</head>
<body>
  <h1 id="greeting">Loading...</h1>
  <p>You're logged in — this page loaded because your session cookie is valid.</p>
  <button onclick="logout()">Log Out</button>

  <script>
    async function checkSession() {
      const res = await fetch('/api/me');
      if (!res.ok) {
        window.location.href = 'login.html';
        return;
      }
      const data = await res.json();
      document.getElementById('greeting').textContent = `Welcome, ${data.username} 👻`;
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = 'login.html';
    }

    checkSession();
  </script>
</body>
</html>
